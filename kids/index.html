<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="הכסף שלי">
  <meta name="theme-color" content="#4f46e5">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>הכסף שלי</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:      #4f46e5;
      --primary-light:#818cf8;
      --green:        #10b981;
      --green-bg:     #d1fae5;
      --red:          #ef4444;
      --red-bg:       #fee2e2;
      --orange:       #f59e0b;
      --orange-bg:    #fef3c7;
      --blue:         #3b82f6;
      --blue-bg:      #dbeafe;
      --purple:       #8b5cf6;
      --purple-bg:    #ede9fe;
      --bg:           #f5f3ff;
      --card:         #ffffff;
      --text:         #1e1b4b;
      --muted:        #6b7280;
      --border:       #e5e7eb;
      --shadow:       0 1px 6px rgba(0,0,0,0.09);
      --radius:       14px;
      --safe-top:     env(safe-area-inset-top, 0px);
      --safe-bottom:  env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 430px;
      margin: 0 auto;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── HEADER ── */
    .header {
      background: var(--primary);
      color: white;
      padding: calc(var(--safe-top) + 14px) 20px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .header-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      padding: 7px 13px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* ── BALANCE CARDS ── */
    .balance-section {
      padding: 14px;
    }
    .total-card {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border-radius: var(--radius);
      padding: 22px 20px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(79,70,229,0.3);
      margin-bottom: 10px;
    }
    .total-card .label { font-size: 14px; opacity: 0.85; margin-bottom: 4px; }
    .total-card .amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; }
    .total-card .currency { font-size: 18px; font-weight: 400; opacity: 0.8; }

    .sub-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .sub-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .sub-card .icon { font-size: 24px; margin-bottom: 6px; }
    .sub-card .label { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .sub-card .amount { font-size: 22px; font-weight: 700; }
    .sub-card.available .amount { color: var(--green); }
    .sub-card.savings .amount { color: var(--purple); }

    /* ── QUICK ACTIONS ── */
    .actions {
      padding: 0 14px 14px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .action-btn {
      background: var(--card);
      border: none;
      border-radius: 12px;
      padding: 14px 8px;
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: transform 0.1s;
    }
    .action-btn:active { transform: scale(0.95); }
    .action-btn .icon { font-size: 22px; width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
    .action-btn .text { font-size: 12px; font-weight: 600; color: var(--text); }

    .action-btn.allowance .icon { background: var(--green-bg); }
    .action-btn.income .icon { background: var(--blue-bg); }
    .action-btn.expense .icon { background: var(--red-bg); }
    .action-btn.to-savings .icon { background: var(--purple-bg); }
    .action-btn.from-savings .icon { background: var(--orange-bg); }
    .action-btn.interest-btn .icon { background: var(--orange-bg); }

    /* ── TRANSACTIONS LIST ── */
    .section-header {
      padding: 14px 14px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-header h2 { font-size: 16px; font-weight: 700; }
    .section-header .link { font-size: 13px; color: var(--primary); font-weight: 600; cursor: pointer; border: none; background: none; }

    .tx-list {
      padding: 0 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .tx-item {
      background: var(--card);
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tx-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .tx-details { flex: 1; min-width: 0; }
    .tx-desc { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tx-date { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .tx-amount { font-size: 16px; font-weight: 700; white-space: nowrap; }
    .tx-amount.positive { color: var(--green); }
    .tx-amount.negative { color: var(--red); }
    .tx-amount.neutral { color: var(--purple); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .empty-state .big { font-size: 48px; margin-bottom: 10px; }
    .empty-state p { font-size: 15px; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--card);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 430px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      animation: slideUp 0.25s ease-out;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .modal-header h2 { font-size: 18px; font-weight: 700; }
    .modal-close {
      background: var(--bg);
      border: none;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 5px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      background: var(--bg);
      transition: border-color 0.15s;
    }
    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      background: white;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: opacity 0.15s;
    }
    .submit-btn:active { opacity: 0.85; }

    /* ── SETUP SCREEN ── */
    .setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
      text-align: center;
    }
    .setup-screen .emoji { font-size: 72px; margin-bottom: 16px; }
    .setup-screen h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: var(--primary); }
    .setup-screen p { font-size: 15px; color: var(--muted); margin-bottom: 30px; }
    .setup-screen input {
      width: 100%;
      max-width: 280px;
      padding: 14px;
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 18px;
      text-align: center;
      font-family: inherit;
      margin-bottom: 16px;
    }
    .setup-screen input:focus { outline: none; border-color: var(--primary); }
    .setup-screen button {
      padding: 14px 40px;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── SETTINGS MODAL ── */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 15px; font-weight: 600; }
    .setting-value { font-size: 15px; color: var(--muted); }
    .setting-input {
      width: 80px;
      padding: 8px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      text-align: center;
      font-family: inherit;
    }
    .setting-input:focus { outline: none; border-color: var(--primary); }

    .danger-btn {
      width: 100%;
      padding: 12px;
      border: 2px solid var(--red);
      border-radius: 12px;
      background: white;
      color: var(--red);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 16px;
    }

    /* ── HISTORY VIEW ── */
    .history-header {
      background: var(--primary);
      color: white;
      padding: calc(var(--safe-top) + 14px) 20px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .back-btn {
      background: rgba(255,255,255,0.18);
      border: none;
      color: white;
      font-size: 18px;
      cursor: pointer;
      padding: 7px 12px;
      border-radius: 20px;
    }
    .history-header h1 { font-size: 20px; font-weight: 700; }

    .filter-bar {
      padding: 10px 14px;
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .filter-chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .month-header {
      font-size: 14px;
      font-weight: 700;
      color: var(--muted);
      padding: 12px 14px 6px;
    }

    /* hide scrollbar */
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar { -ms-overflow-style: none; scrollbar-width: none; }

    /* confirm dialog */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }
    .confirm-overlay.open { display: flex; }
    .confirm-box {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 85%;
      max-width: 320px;
      text-align: center;
    }
    .confirm-box p { font-size: 16px; font-weight: 600; margin-bottom: 18px; }
    .confirm-buttons { display: flex; gap: 10px; }
    .confirm-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .confirm-cancel { background: var(--bg); color: var(--text); }
    .confirm-ok { background: var(--red); color: white; }
  </style>
</head>
<body>

<!-- ── SETUP SCREEN ── -->
<div id="setup" style="display:none">
  <div class="setup-screen">
    <div class="emoji">&#x1F4B0;</div>
    <h1>הכסף שלי</h1>
    <p>ניהול תקציב חכם</p>
    <input id="setupName" type="text" placeholder="מה השם שלך?" autocomplete="off">
    <br>
    <button onclick="saveName()">יאללה, מתחילים!</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app" style="display:none">
  <!-- Header -->
  <div class="header">
    <h1 id="headerTitle">הכסף שלי</h1>
    <button class="header-btn" onclick="openSettings()">&#x2699;</button>
  </div>

  <!-- Main View -->
  <div id="mainView">
    <!-- Balance -->
    <div class="balance-section">
      <div class="total-card">
        <div class="label">סך הכל</div>
        <div class="amount"><span id="totalAmount">0</span> <span class="currency">&#x20AA;</span></div>
      </div>
      <div class="sub-cards">
        <div class="sub-card available">
          <div class="icon">&#x1F4B3;</div>
          <div class="label">זמין להוצאה</div>
          <div class="amount"><span id="availableAmount">0</span> &#x20AA;</div>
        </div>
        <div class="sub-card savings">
          <div class="icon">&#x1F3E6;</div>
          <div class="label">חיסכון</div>
          <div class="amount"><span id="savingsAmount">0</span> &#x20AA;</div>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="actions">
      <button class="action-btn allowance" onclick="openTx('allowance')">
        <div class="icon">&#x1F4B5;</div>
        <div class="text">דמי כיס</div>
      </button>
      <button class="action-btn income" onclick="openTx('income')">
        <div class="icon">&#x1F4E5;</div>
        <div class="text">הכנסה</div>
      </button>
      <button class="action-btn expense" onclick="openTx('expense')">
        <div class="icon">&#x1F6D2;</div>
        <div class="text">הוצאה</div>
      </button>
      <button class="action-btn to-savings" onclick="openTx('to_savings')">
        <div class="icon">&#x1F4E6;</div>
        <div class="text">לחיסכון</div>
      </button>
      <button class="action-btn from-savings" onclick="openTx('from_savings')">
        <div class="icon">&#x1F4E4;</div>
        <div class="text">מחיסכון</div>
      </button>
      <button class="action-btn interest-btn" onclick="calcInterest()">
        <div class="icon">&#x1F4C8;</div>
        <div class="text">חשב ריבית</div>
      </button>
    </div>

    <!-- Recent Transactions -->
    <div class="section-header">
      <h2>תנועות אחרונות</h2>
      <button class="link" onclick="showHistory()">הכל &#x2190;</button>
    </div>
    <div id="recentTx" class="tx-list"></div>
  </div>

  <!-- History View -->
  <div id="historyView" style="display:none">
    <div class="filter-bar" id="filterBar"></div>
    <div id="historyList" class="tx-list" style="padding-top:8px"></div>
  </div>
</div>

<!-- ── TRANSACTION MODAL ── -->
<div class="modal-overlay" id="txModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="txModalTitle">תנועה חדשה</h2>
      <button class="modal-close" onclick="closeTx()">&#x2715;</button>
    </div>
    <div class="form-group">
      <label>סכום (&#x20AA;)</label>
      <input id="txAmount" type="number" inputmode="numeric" placeholder="0" autocomplete="off">
    </div>
    <div class="form-group">
      <label>תיאור</label>
      <input id="txDesc" type="text" placeholder="למה?" autocomplete="off">
    </div>
    <button class="submit-btn" id="txSubmitBtn" onclick="submitTx()">הוסף</button>
  </div>
</div>

<!-- ── SETTINGS MODAL ── -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="modal-header">
      <h2>הגדרות</h2>
      <button class="modal-close" onclick="closeSettings()">&#x2715;</button>
    </div>
    <div class="setting-row">
      <span class="setting-label">שם</span>
      <input class="setting-input" id="settingName" style="width:140px" type="text">
    </div>
    <div class="setting-row">
      <span class="setting-label">ריבית שנתית %</span>
      <input class="setting-input" id="settingRate" type="number" inputmode="decimal" step="0.1">
    </div>
    <div class="setting-row">
      <span class="setting-label">ריבית חושבה לאחרונה</span>
      <span class="setting-value" id="lastInterestDate">-</span>
    </div>
    <button class="submit-btn" onclick="saveSettings()">שמור</button>
    <button class="danger-btn" onclick="confirmReset()">איפוס כל הנתונים</button>
  </div>
</div>

<!-- ── CONFIRM DIALOG ── -->
<div class="confirm-overlay" id="confirmDialog">
  <div class="confirm-box">
    <p id="confirmText">בטוח?</p>
    <div class="confirm-buttons">
      <button class="confirm-cancel" onclick="closeConfirm()">ביטול</button>
      <button class="confirm-ok" id="confirmOkBtn" onclick="">אישור</button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════
   STATE & STORAGE
   ══════════════════════════════════ */
const KEYS = { profile: 'budget_profile_v1', tx: 'budget_tx_v1', settings: 'budget_settings_v1' };

let profile = JSON.parse(localStorage.getItem(KEYS.profile)) || null;
let transactions = JSON.parse(localStorage.getItem(KEYS.tx)) || [];
let settings = JSON.parse(localStorage.getItem(KEYS.settings)) || { interestRate: 5, lastInterestDate: null };

function saveProfile() { localStorage.setItem(KEYS.profile, JSON.stringify(profile)); }
function saveTx() { localStorage.setItem(KEYS.tx, JSON.stringify(transactions)); }
function saveSettings() {
  settings.interestRate = parseFloat(document.getElementById('settingRate').value) || 0;
  const newName = document.getElementById('settingName').value.trim();
  if (newName) { profile.name = newName; saveProfile(); }
  localStorage.setItem(KEYS.settings, JSON.stringify(settings));
  closeSettings();
  render();
}
function saveSettingsQuiet() { localStorage.setItem(KEYS.settings, JSON.stringify(settings)); }

/* ══════════════════════════════════
   INIT
   ══════════════════════════════════ */
function init() {
  if (!profile) {
    document.getElementById('setup').style.display = '';
    document.getElementById('app').style.display = 'none';
  } else {
    document.getElementById('setup').style.display = 'none';
    document.getElementById('app').style.display = '';
    autoInterest();
    render();
  }
}

function saveName() {
  const name = document.getElementById('setupName').value.trim();
  if (!name) return;
  profile = { name };
  saveProfile();
  init();
}

/* ══════════════════════════════════
   CALCULATIONS
   ══════════════════════════════════ */
function calcBalances() {
  let available = 0, savings = 0;
  for (const tx of transactions) {
    switch (tx.type) {
      case 'allowance': case 'income': available += tx.amount; break;
      case 'expense': available -= tx.amount; break;
      case 'to_savings': available -= tx.amount; savings += tx.amount; break;
      case 'from_savings': available += tx.amount; savings -= tx.amount; break;
      case 'interest': savings += tx.amount; break;
    }
  }
  return { available: Math.round(available * 100) / 100, savings: Math.round(savings * 100) / 100 };
}

/* ══════════════════════════════════
   INTEREST
   ══════════════════════════════════ */
function autoInterest() {
  if (!settings.lastInterestDate) return;
  const last = new Date(settings.lastInterestDate);
  const now = new Date();
  // Check if a full month has passed
  const monthsDiff = (now.getFullYear() - last.getFullYear()) * 12 + (now.getMonth() - last.getMonth());
  if (monthsDiff >= 1) {
    applyInterest(monthsDiff);
  }
}

function calcInterest() {
  const { savings } = calcBalances();
  if (savings <= 0) {
    alert('אין כסף בחיסכון לחישוב ריבית');
    return;
  }
  if (!settings.lastInterestDate) {
    // First time — set start date and calculate for 1 month
    applyInterest(1);
    return;
  }
  const last = new Date(settings.lastInterestDate);
  const now = new Date();
  const monthsDiff = (now.getFullYear() - last.getFullYear()) * 12 + (now.getMonth() - last.getMonth());
  if (monthsDiff < 1) {
    const next = new Date(last);
    next.setMonth(next.getMonth() + 1);
    const daysLeft = Math.ceil((next - now) / (1000 * 60 * 60 * 24));
    alert('הריבית הבאה תחושב בעוד ' + daysLeft + ' ימים');
    return;
  }
  applyInterest(monthsDiff);
}

function applyInterest(months) {
  const { savings } = calcBalances();
  if (savings <= 0) return;
  const monthlyRate = settings.interestRate / 100 / 12;
  let total = 0;
  let base = savings;
  for (let i = 0; i < months; i++) {
    const interest = Math.round(base * monthlyRate * 100) / 100;
    total += interest;
    base += interest;
  }
  if (total <= 0) return;
  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: 'interest',
    amount: Math.round(total * 100) / 100,
    desc: 'ריבית על חיסכון (' + months + ' חודשים, ' + settings.interestRate + '%)',
    createdAt: new Date().toISOString()
  });
  saveTx();
  settings.lastInterestDate = new Date().toISOString();
  saveSettingsQuiet();
  render();
}

/* ══════════════════════════════════
   RENDER
   ══════════════════════════════════ */
function render() {
  if (!profile) return;
  document.getElementById('headerTitle').textContent = 'הכסף של ' + profile.name;
  const { available, savings } = calcBalances();
  const total = Math.round((available + savings) * 100) / 100;
  document.getElementById('totalAmount').textContent = formatNum(total);
  document.getElementById('availableAmount').textContent = formatNum(available);
  document.getElementById('savingsAmount').textContent = formatNum(savings);
  renderRecent();
}

function formatNum(n) {
  return n.toLocaleString('he-IL', { maximumFractionDigits: 2 });
}

function renderRecent() {
  const el = document.getElementById('recentTx');
  const recent = [...transactions].reverse().slice(0, 8);
  if (recent.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="big">&#x1F4AD;</div><p>עדיין אין תנועות.<br>התחל להוסיף!</p></div>';
    return;
  }
  el.innerHTML = recent.map(txHtml).join('');
}

const TX_META = {
  allowance: { icon: '\u{1F4B5}', label: 'דמי כיס', bg: 'var(--green-bg)', sign: '+' },
  income:    { icon: '\u{1F4E5}', label: 'הכנסה', bg: 'var(--blue-bg)', sign: '+' },
  expense:   { icon: '\u{1F6D2}', label: 'הוצאה', bg: 'var(--red-bg)', sign: '-' },
  to_savings:{ icon: '\u{1F4E6}', label: 'לחיסכון', bg: 'var(--purple-bg)', sign: '' },
  from_savings:{ icon: '\u{1F4E4}', label: 'מחיסכון', bg: 'var(--orange-bg)', sign: '' },
  interest:  { icon: '\u{1F4C8}', label: 'ריבית', bg: 'var(--orange-bg)', sign: '+' }
};

function txHtml(tx) {
  const m = TX_META[tx.type] || TX_META.income;
  const cls = m.sign === '+' ? 'positive' : m.sign === '-' ? 'negative' : 'neutral';
  const prefix = m.sign === '+' ? '+' : m.sign === '-' ? '-' : '';
  return `<div class="tx-item" onclick="confirmDelete('${tx.id}')">
    <div class="tx-icon" style="background:${m.bg}">${m.icon}</div>
    <div class="tx-details">
      <div class="tx-desc">${tx.desc || m.label}</div>
      <div class="tx-date">${formatDate(tx.createdAt)}</div>
    </div>
    <div class="tx-amount ${cls}">${prefix}${formatNum(tx.amount)} &#x20AA;</div>
  </div>`;
}

function formatDate(iso) {
  const d = new Date(iso);
  const day = d.getDate().toString().padStart(2, '0');
  const mon = (d.getMonth() + 1).toString().padStart(2, '0');
  const year = d.getFullYear().toString().slice(-2);
  const hrs = d.getHours().toString().padStart(2, '0');
  const min = d.getMinutes().toString().padStart(2, '0');
  return `${day}/${mon}/${year} ${hrs}:${min}`;
}

function monthKey(iso) {
  const d = new Date(iso);
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return months[d.getMonth()] + ' ' + d.getFullYear();
}

/* ══════════════════════════════════
   HISTORY VIEW
   ══════════════════════════════════ */
let historyFilter = 'all';

function showHistory() {
  document.getElementById('mainView').style.display = 'none';
  document.getElementById('historyView').style.display = '';
  document.querySelector('.header h1').textContent = 'היסטוריה';
  document.querySelector('.header-btn').style.display = 'none';
  historyFilter = 'all';
  renderFilters();
  renderHistory();
  // Replace settings button with back button
  const hdr = document.querySelector('.header');
  const backBtn = document.createElement('button');
  backBtn.className = 'header-btn';
  backBtn.id = 'histBackBtn';
  backBtn.innerHTML = '&#x2190; חזרה';
  backBtn.onclick = hideHistory;
  hdr.appendChild(backBtn);
}

function hideHistory() {
  document.getElementById('mainView').style.display = '';
  document.getElementById('historyView').style.display = 'none';
  document.querySelector('.header-btn').style.display = '';
  const backBtn = document.getElementById('histBackBtn');
  if (backBtn) backBtn.remove();
  render();
}

function renderFilters() {
  const types = [
    { key: 'all', label: 'הכל' },
    { key: 'allowance', label: 'דמי כיס' },
    { key: 'income', label: 'הכנסה' },
    { key: 'expense', label: 'הוצאה' },
    { key: 'to_savings', label: 'לחיסכון' },
    { key: 'from_savings', label: 'מחיסכון' },
    { key: 'interest', label: 'ריבית' }
  ];
  document.getElementById('filterBar').innerHTML = types.map(t =>
    `<button class="filter-chip ${historyFilter === t.key ? 'active' : ''}" onclick="setFilter('${t.key}')">${t.label}</button>`
  ).join('');
}

function setFilter(f) {
  historyFilter = f;
  renderFilters();
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyList');
  let filtered = [...transactions].reverse();
  if (historyFilter !== 'all') {
    filtered = filtered.filter(tx => tx.type === historyFilter);
  }
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="big">&#x1F4AD;</div><p>אין תנועות</p></div>';
    return;
  }
  let html = '';
  let currentMonth = '';
  for (const tx of filtered) {
    const mk = monthKey(tx.createdAt);
    if (mk !== currentMonth) {
      currentMonth = mk;
      html += `<div class="month-header">${mk}</div>`;
    }
    html += txHtml(tx);
  }
  el.innerHTML = html;
}

/* ══════════════════════════════════
   TRANSACTION MODAL
   ══════════════════════════════════ */
let currentTxType = 'allowance';

const TX_TITLES = {
  allowance: 'הוספת דמי כיס',
  income: 'הוספת הכנסה',
  expense: 'הוספת הוצאה',
  to_savings: 'העברה לחיסכון',
  from_savings: 'משיכה מחיסכון'
};

const TX_DESC_PLACEHOLDER = {
  allowance: 'דמי כיס שבועיים',
  income: 'עבודה / מתנה מסבא...',
  expense: 'מה קנית?',
  to_savings: 'חיסכון',
  from_savings: 'משיכה מחיסכון'
};

function openTx(type) {
  currentTxType = type;
  document.getElementById('txModalTitle').textContent = TX_TITLES[type];
  document.getElementById('txAmount').value = '';
  document.getElementById('txDesc').value = '';
  document.getElementById('txDesc').placeholder = TX_DESC_PLACEHOLDER[type] || '';
  document.getElementById('txModal').classList.add('open');
  setTimeout(() => document.getElementById('txAmount').focus(), 100);
}

function closeTx() {
  document.getElementById('txModal').classList.remove('open');
}

function submitTx() {
  const amount = parseFloat(document.getElementById('txAmount').value);
  if (!amount || amount <= 0) { alert('הזן סכום תקין'); return; }

  // Validate sufficient funds
  const { available, savings } = calcBalances();
  if (currentTxType === 'expense' && amount > available) {
    alert('אין מספיק כסף זמין! (יש ' + formatNum(available) + ' ₪)');
    return;
  }
  if (currentTxType === 'to_savings' && amount > available) {
    alert('אין מספיק כסף זמין! (יש ' + formatNum(available) + ' ₪)');
    return;
  }
  if (currentTxType === 'from_savings' && amount > savings) {
    alert('אין מספיק כסף בחיסכון! (יש ' + formatNum(savings) + ' ₪)');
    return;
  }

  const desc = document.getElementById('txDesc').value.trim();
  transactions.push({
    id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: currentTxType,
    amount,
    desc: desc || TX_META[currentTxType].label,
    createdAt: new Date().toISOString()
  });
  saveTx();

  // If this is the first savings deposit, set interest start date
  if (currentTxType === 'to_savings' && !settings.lastInterestDate) {
    settings.lastInterestDate = new Date().toISOString();
    saveSettingsQuiet();
  }

  closeTx();
  render();
}

/* ══════════════════════════════════
   SETTINGS
   ══════════════════════════════════ */
function openSettings() {
  document.getElementById('settingName').value = profile.name;
  document.getElementById('settingRate').value = settings.interestRate;
  document.getElementById('lastInterestDate').textContent = settings.lastInterestDate
    ? formatDate(settings.lastInterestDate)
    : 'עדיין לא חושבה';
  document.getElementById('settingsModal').classList.add('open');
}

function closeSettings() {
  document.getElementById('settingsModal').classList.remove('open');
}

/* ══════════════════════════════════
   DELETE & CONFIRM
   ══════════════════════════════════ */
function confirmDelete(id) {
  document.getElementById('confirmText').textContent = 'למחוק תנועה זו?';
  document.getElementById('confirmOkBtn').onclick = () => { deleteTx(id); closeConfirm(); };
  document.getElementById('confirmDialog').classList.add('open');
}

function deleteTx(id) {
  transactions = transactions.filter(tx => tx.id !== id);
  saveTx();
  render();
  if (document.getElementById('historyView').style.display !== 'none') {
    renderHistory();
  }
}

function confirmReset() {
  closeSettings();
  document.getElementById('confirmText').textContent = 'למחוק את כל הנתונים? פעולה זו לא ניתנת לביטול!';
  document.getElementById('confirmOkBtn').onclick = () => { resetAll(); closeConfirm(); };
  document.getElementById('confirmDialog').classList.add('open');
}

function resetAll() {
  localStorage.removeItem(KEYS.profile);
  localStorage.removeItem(KEYS.tx);
  localStorage.removeItem(KEYS.settings);
  profile = null;
  transactions = [];
  settings = { interestRate: 5, lastInterestDate: null };
  init();
}

function closeConfirm() {
  document.getElementById('confirmDialog').classList.remove('open');
}

/* ══════════════════════════════════
   SERVICE WORKER
   ══════════════════════════════════ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

/* ══════════════════════════════════
   START
   ══════════════════════════════════ */
init();
</script>
